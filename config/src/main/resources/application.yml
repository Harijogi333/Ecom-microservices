spring:
  application:
    name: config
  profiles:
    active: native
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    virtual-host: ${RABBITMQ_VHOST:guest}
    connection-timeout: 30000


  cloud:
    config:
      server:
        native:
          search-locations: file:///M:\New Projects\new\microservices\config\src\main\resources\configFile

server:
  port: 8888

management:
  endpoints:
    web:
      exposure:
        include: "*"
